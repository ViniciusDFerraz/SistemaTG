<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG 02 011 – Sistema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --verde:#1B3A2D; --dourado:#B8973A; --dourado-c:#D4AF58;
    --creme:#F5F0E8; --cinza:#8A8A8A; --branco:#FFFFFF; --preto:#0E0E0E;
    --fundo:#0d0d0d; --card:#161616; --borda:rgba(184,151,58,0.18);
    --erro:#c0392b; --ok:#27ae60;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'DM Sans',sans-serif;background:var(--fundo);color:var(--creme);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
  }

  /* ── LAYOUT DOIS PAINÉIS ── */
  .outer{
    display:flex;width:100%;max-width:820px;min-height:520px;
    border:1px solid var(--borda);background:var(--card);
    overflow:hidden;
    position:relative;
  }

  /* PAINEL ESQUERDO – sempre visível, é o "login" */
  .painel{
    flex:1;padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center;
    transition:opacity .35s, transform .35s;
  }
  .painel-login{ background:var(--card); }
  .painel-registro{
    background:#111;border-left:1px solid var(--borda);
    transform:translateX(0);opacity:1;
  }

  /* Estado: só mostrando login (registro escondido) */
  .so-login .painel-registro{
    opacity:0;pointer-events:none;transform:translateX(40px);
  }
  /* Estado: só mostrando registro (login escondido) */
  .so-registro .painel-login{
    opacity:0;pointer-events:none;transform:translateX(-40px);
  }
  /* Mobile: empilha */
  @media(max-width:640px){
    .outer{flex-direction:column;max-width:420px;}
    .painel-registro{border-left:none;border-top:1px solid var(--borda);}
    .so-login .painel-registro{transform:translateY(20px);}
    .so-registro .painel-login{transform:translateY(-20px);}
  }

  /* ── LOGO ── */
  .logo{margin-bottom:2rem;}
  .logo-tg{font-family:'Oswald',sans-serif;font-size:2.4rem;font-weight:700;color:var(--branco);letter-spacing:-0.02em;line-height:1;}
  .logo-tg span{color:var(--dourado);}
  .logo-sub{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--cinza);margin-top:4px;}

  /* ── TÍTULOS DOS PAINÉIS ── */
  .painel-titulo{
    font-family:'Oswald',sans-serif;font-size:0.72rem;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--dourado);margin-bottom:1.6rem;
    display:flex;align-items:center;gap:0.8rem;
  }
  .painel-titulo::after{content:'';flex:1;height:1px;background:var(--borda);}

  /* ── CAMPOS ── */
  .campo{margin-bottom:1rem;}
  .campo label{display:block;font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--cinza);margin-bottom:0.35rem;}
  .campo input,.campo select{
    width:100%;background:#1a1a1a;border:1px solid var(--borda);color:var(--creme);
    padding:0.7rem 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;
    outline:none;transition:border-color .2s;
  }
  .campo input:focus,.campo select:focus{border-color:var(--dourado);}
  .campo select option{background:#1a1a1a;}

  /* Campo de código — aparece/some */
  #wrap-codigo{transition:opacity .3s,max-height .3s;overflow:hidden;max-height:80px;}
  #wrap-codigo.oculto{opacity:0;max-height:0;pointer-events:none;}

  /* ── BOTÃO ── */
  .btn-principal{
    width:100%;padding:0.8rem;background:var(--dourado);color:var(--preto);
    font-family:'Oswald',sans-serif;font-size:0.85rem;font-weight:600;
    letter-spacing:0.18em;text-transform:uppercase;border:none;cursor:pointer;
    transition:background .2s;margin-top:0.4rem;
  }
  .btn-principal:hover{background:var(--dourado-c);}

  /* ── LINK TROCAR ── */
  .trocar{
    font-size:0.75rem;color:var(--cinza);margin-top:1.2rem;text-align:center;cursor:pointer;
  }
  .trocar span{color:var(--dourado);text-decoration:underline;cursor:pointer;}

  /* ── MENSAGEM ── */
  .msg{font-size:0.78rem;padding:0.5rem 0.8rem;margin-bottom:0.8rem;display:none;border-left:3px solid;}
  .msg.erro{background:rgba(192,57,43,.1);border-color:var(--erro);color:#e74c3c;display:block;}
  .msg.ok  {background:rgba(39,174,96,.1);border-color:var(--ok);color:#2ecc71;display:block;}

  /* hint abaixo do cargo */
  .hint{font-size:0.68rem;color:var(--cinza);margin-top:0.3rem;font-style:italic;}
</style>
</head>
<body>

<div class="outer so-login" id="outer">

  <!-- ══ PAINEL ESQUERDO: LOGIN ══ -->
  <div class="painel painel-login">
    <div class="logo">
      <div class="logo-tg">TG <span>02 011</span></div>
      <div class="logo-sub">Sistema de Gestão</div>
    </div>

    <div class="painel-titulo">Entrar</div>
    <div class="msg" id="msg-login"></div>

    <div class="campo">
      <label>Nome de guerra</label>
      <input type="text" id="l-guerra" placeholder="Seu nome de guerra">
    </div>
    <div class="campo">
      <label>Senha</label>
      <input type="password" id="l-senha" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="btn-principal" onclick="fazerLogin()">Entrar no sistema</button>

    <div class="trocar">Não tem conta? <span onclick="mostrar('registro')">Registrar</span></div>
  </div>

  <!-- ══ PAINEL DIREITO: REGISTRO ══ -->
  <div class="painel painel-registro">
    <div class="painel-titulo">Criar conta</div>
    <div class="msg" id="msg-reg"></div>

    <div class="campo">
      <label>Nome completo</label>
      <input type="text" id="r-nome" placeholder="Nome Sobrenome">
    </div>
    <div class="campo">
      <label>Nome de guerra</label>
      <input type="text" id="r-guerra" placeholder="Ex: Silva, Costa…">
    </div>
    <div class="campo">
      <label>Senha</label>
      <input type="password" id="r-senha" placeholder="••••••••">
    </div>
    <div class="campo">
      <label>Cargo</label>
      <select id="r-cargo" onchange="atualizarCodigo()">
        <option value="">Selecione</option>
        
        <option value="sargento">1º Sargento</option>
        <option value="civil">Civil</option>
      </select>
      <div class="hint" id="hint-cargo"></div>
    </div>
    <div id="wrap-codigo" class="oculto">
      <div class="campo">
        <label>Código de acesso</label>
        <input type="password" id="r-codigo" placeholder="Fornecido pelo administrador">
      </div>
    </div>

    <button class="btn-principal" onclick="fazerRegistro()">Criar conta</button>
    <div class="trocar">Já tem conta? <span onclick="mostrar('login')">Entrar</span></div>
  </div>

</div>

<script>
  const CODIGO_PADRAO = 'TG02011';

  function mostrar(painel) {
    const outer = document.getElementById('outer');
    outer.className = 'outer ' + (painel === 'login' ? 'so-login' : 'so-registro');
    limparMsg('msg-login');
    limparMsg('msg-reg');
  }

  function atualizarCodigo() {
    const cargo = document.getElementById('r-cargo').value;
    const wrap  = document.getElementById('wrap-codigo');
    const hint  = document.getElementById('hint-cargo');
    const militares = ['sargento'];
    if (militares.includes(cargo)) {
      wrap.classList.add('oculto');
      hint.textContent = 'Acesso liberado — militares entram sem código.';
    } else if (cargo === 'civil') {
      wrap.classList.remove('oculto');
      hint.textContent = 'Civis precisam do código fornecido pelo administrador.';
    } else {
      wrap.classList.add('oculto');
      hint.textContent = '';
    }
  }

  function msgEl(id, txt, tipo) {
    const el = document.getElementById(id);
    el.textContent = txt; el.className = 'msg ' + tipo;
  }
  function limparMsg(id) { const el=document.getElementById(id); el.className='msg'; el.textContent=''; }

  function fazerLogin() {
    const guerra = document.getElementById('l-guerra').value.trim();
    const senha  = document.getElementById('l-senha').value;
    if (!guerra || !senha) { msgEl('msg-login','Preencha nome de guerra e senha.','erro'); return; }
    const users = JSON.parse(localStorage.getItem('tg_users')||'[]');
    const user  = users.find(x => x.guerra === guerra && x.senha === senha);
    if (!user) { msgEl('msg-login','Nome de guerra ou senha incorretos.','erro'); return; }
    if (!user.ativo) { msgEl('msg-login','Conta aguardando aprovação do administrador.','erro'); return; }
    sessionStorage.setItem('tg_logado', JSON.stringify(user));
    window.location.href = 'dashboard.html';
  }

  function fazerRegistro() {
    const nome   = document.getElementById('r-nome').value.trim();
    const guerra = document.getElementById('r-guerra').value.trim();
    const senha  = document.getElementById('r-senha').value;
    const cargo  = document.getElementById('r-cargo').value;
    const codigo = document.getElementById('r-codigo').value;

    if (!nome || !guerra || !senha || !cargo) { msgEl('msg-reg','Preencha todos os campos.','erro'); return; }

    const militares = ['sargento'];
    const precisaCodigo = !militares.includes(cargo);

    if (precisaCodigo) {
      const cfg = JSON.parse(localStorage.getItem('tg_config')||'{}');
      const codigoValido = cfg.codigoAcesso || CODIGO_PADRAO;
      if (codigo !== codigoValido) { msgEl('msg-reg','Código de acesso inválido.','erro'); return; }
    }

    const users = JSON.parse(localStorage.getItem('tg_users')||'[]');
    if (users.find(x => x.guerra === guerra)) { msgEl('msg-reg','Nome de guerra já cadastrado.','erro'); return; }

    const isAdmin  = users.length === 0;
    // militares entram ativos automaticamente; civis aguardam aprovação
    const ativoAuto = militares.includes(cargo) || isAdmin;

    users.push({ nome, guerra, senha, cargo, ativo: ativoAuto, admin: isAdmin, id: Date.now() });
    localStorage.setItem('tg_users', JSON.stringify(users));

    if (isAdmin) {
      msgEl('msg-reg','Conta criada! Você é o administrador. Pode entrar.','ok');
    } else if (ativoAuto) {
      msgEl('msg-reg','Conta criada! Você já pode entrar.','ok');
      setTimeout(()=>mostrar('login'), 1800);
    } else {
      msgEl('msg-reg','Conta criada! Aguarde aprovação do administrador.','ok');
    }
  }
</script>
</body>
</html>
